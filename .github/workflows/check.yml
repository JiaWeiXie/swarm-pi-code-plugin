name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install mise and project tools
        uses: jdx/mise-action@v4.2.0
        with:
          version: 2026.6.3
          cache: true

      - name: Install locked dependencies
        run: npm ci

      - name: Run quality checks
        run: mise run check

      - name: Build source and plugin runtime
        run: mise run build

      - name: Reject generated runtime drift
        run: |
          git diff --exit-code -- plugins/swarm-pi-code-plugin/runtime
          test -z "$(git ls-files --others --exclude-standard -- plugins/swarm-pi-code-plugin/runtime)"
