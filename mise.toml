min_version = "2026.6.3"

[tools]
node = "24.15.0"

[env]
NODE_ENV = "development"

[tasks.install]
description = "Install Node dependencies and update the lockfile"
run = "npm install"

[tasks.test]
description = "Run the Node test suite"
run = "npm test"

[tasks.typecheck]
description = "Type-check the TypeScript sources"
run = "npm run typecheck"

[tasks.lint]
description = "Lint TypeScript sources"
run = "npm run lint"

[tasks.lint-fix]
description = "Fix lint findings in TypeScript sources"
run = "npm run lint:fix"

[tasks.fmt]
description = "Format TypeScript sources"
run = "npm run fmt"

[tasks.fmt-check]
description = "Check TypeScript source formatting"
run = "npm run fmt:check"

[tasks.build]
description = "Compile the runner and library"
run = "npm run build"

[tasks.check]
description = "Run all project quality gates"
run = "npm run check"
